# Mastering ERPNext Development - Chapter 2
# Docker Compose for Frappe Development Environment

version: '3.8'

services:
  # MariaDB Database
  mariadb:
    image: mariadb:10.6
    container_name: frappe-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: frappe
      MYSQL_PASSWORD: frappe
      MYSQL_DATABASE: frappe
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./config/mysql.cnf:/etc/mysql/conf.d/frappe.cnf:ro
    ports:
      - "3306:3306"
    networks:
      - frappe-network

  # Redis Cache
  redis-cache:
    image: redis:7-alpine
    container_name: frappe-redis-cache
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-cache-data:/data
    ports:
      - "13000:6379"
    networks:
      - frappe-network

  # Redis Queue
  redis-queue:
    image: redis:7-alpine
    container_name: frappe-redis-queue
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-queue-data:/data
    ports:
      - "13001:6379"
    networks:
      - frappe-network

  # Redis SocketIO
  redis-socketio:
    image: redis:7-alpine
    container_name: frappe-redis-socketio
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-socketio-data:/data
    ports:
      - "13002:6379"
    networks:
      - frappe-network

  # Frappe Bench (Development)
  frappe-bench:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frappe-bench
    restart: unless-stopped
    environment:
      - FRAPPE_USER=frappe
      - FRAPPE_SITE_NAME=dev.local
      - MYSQL_ROOT_PASSWORD=root
      - REDIS_CACHE=redis-cache:6379
      - REDIS_QUEUE=redis-queue:6379
      - REDIS_SOCKETIO=redis-socketio:6379
    volumes:
      - ./bench:/home/frappe/frappe-bench
      - ./sites:/home/frappe/sites
      - ./apps:/home/frappe/apps
      - ./logs:/home/frappe/logs
    ports:
      - "8000:8000"  # Web server
      - "9000:9000"  # SocketIO
      - "6787:6787"  # Watch files
    depends_on:
      - mariadb
      - redis-cache
      - redis-queue
      - redis-socketio
    networks:
      - frappe-network
    command: >
      bash -c "
        wait-for-it mariadb:3306 --timeout=60 &&
        wait-for-it redis-cache:6379 --timeout=30 &&
        wait-for-it redis-queue:6379 --timeout=30 &&
        wait-for-it redis-socketio:6379 --timeout=30 &&
        cd /home/frappe/frappe-bench &&
        bench start
      "

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: frappe-nginx
    restart: unless-stopped
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./sites:/var/www/html/sites:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frappe-bench
    networks:
      - frappe-network

  # PhpMyAdmin (Optional)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: frappe-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8080:80"
    depends_on:
      - mariadb
    networks:
      - frappe-network

volumes:
  mariadb-data:
  redis-cache-data:
  redis-queue-data:
  redis-socketio-data:

networks:
  frappe-network:
    driver: bridge
